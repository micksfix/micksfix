  <p class="lead">Send a message about a golf lesson, a PEMF wellness session, or anything you&rsquo;d like to ask. I&rsquo;ll get back to you personally.</p>

  <label for="message">Message</label>
  <textarea id="message" rows="5" placeholder="Tell me a bit about what you&rsquo;re looking for"></textarea>
  <button class="btn-primary" type="button" onclick="alert('This is a placeholder. We will connect it to a free form service (like Formspree) so messages actually reach your inbox.')">Send message</button>

</div>

<footer class="footer">
  <div class="fname">Mickey Osugi</div>
